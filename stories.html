
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故事篇 ‧ 經典巡禮 | 南海慈寧宮</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --temple-red: #B22222;
      --temple-gold: #C5A009;
      --temple-bg: #FFFFFF;
      --temple-text: #333333;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--temple-bg);
      color: var(--temple-text);
      overflow-x: hidden;
    }
    .serif-title { font-family: 'Noto Serif TC', serif; }
    
    .ornament-border {
      border: 1px solid rgba(178, 34, 34, 0.1);
      position: relative;
    }
    .ornament-border::before {
      content: ""; position: absolute; top: -2px; left: -2px; width: 14px; height: 14px;
      border-top: 2px solid var(--temple-red); border-left: 2px solid var(--temple-red);
    }
    .ornament-border::after {
      content: ""; position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px;
      border-bottom: 2px solid var(--temple-red); border-right: 2px solid var(--temple-red);
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease-out;
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <header class="py-6 bg-white border-b border-gray-100 fixed top-0 left-0 right-0 z-50 shadow-sm">
    <div class="container mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="https://lh3.googleusercontent.com/d/1Um9FSgxjlrOvIWgvYmOLJI5jrGBNDoWw" alt="LOGO" class="w-10 h-10 object-contain">
        <h1 class="text-xl font-black tracking-[0.2em] serif-title text-[#B22222]">南海慈寧宮</h1>
      </div>
      <div class="flex items-center gap-6">
        <a href="./index.html" class="text-sm font-black tracking-widest text-[#B22222] hover:text-[#C5A009] transition-all">返回首頁</a>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-6 py-32 max-w-4xl">
    <div class="text-center mb-20">
      <h2 class="text-4xl md:text-6xl font-black text-[#B22222] serif-title tracking-widest mb-4">故事篇</h2>
      <p class="text-gray-400 tracking-[0.5em] uppercase text-sm">Stories & Sutras</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <!-- 心經 -->
      <div class="reveal">
        <div class="bg-white ornament-border p-8 shadow-sm hover:shadow-xl transition-all duration-500 group h-full flex flex-col">
          <div class="mb-8 overflow-hidden ornament-border aspect-video">
            <img src="https://lh3.googleusercontent.com/d/1ESjeUuG6HjeTEg4U7pILkTXgR1180vu9" alt="心經" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
          </div>
          <h3 class="text-2xl font-black serif-title text-[#B22222] mb-4">般若波羅蜜多心經</h3>
          <p class="text-gray-500 mb-8 line-clamp-3 flex-grow">為何短短 260 字能流傳千古？這不僅是一部經典，更藏著一段關於玄奘法師與觀世音菩薩慈悲結緣的殊勝故事。</p>
          <a href="./heart-sutra.html" class="inline-block bg-[#B22222] text-white px-8 py-3 font-black tracking-widest hover:bg-[#C5A009] transition-all text-center">閱讀全文</a>
        </div>
      </div>

      <!-- 金剛經 -->
      <div class="reveal">
        <div class="bg-white ornament-border p-8 shadow-sm hover:shadow-xl transition-all duration-500 group h-full flex flex-col">
          <div class="mb-8 overflow-hidden ornament-border aspect-video">
            <img src="https://lh3.googleusercontent.com/d/1eYSPefo1t-tzD_tUlb9uAlhg_DH4mlZZ" alt="金剛經" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
          </div>
          <h3 class="text-2xl font-black serif-title text-[#B22222] mb-4">金剛般若波羅蜜經</h3>
          <p class="text-gray-500 mb-8 line-clamp-3 flex-grow">「金剛」代表能斬斷煩惱的智慧。它不教我們如何獲得更多，而是教我們如何「放下」，找回內心堅不可摧的平靜。</p>
          <a href="./diamond-sutra.html" class="inline-block bg-[#B22222] text-white px-8 py-3 font-black tracking-widest hover:bg-[#C5A009] transition-all text-center">閱讀全文</a>
        </div>
      </div>
    </div>

    <div class="mt-32 text-center">
      <a href="./index.html" class="bg-[#B22222] text-white px-12 py-4 text-xl font-black tracking-widest hover:bg-[#C5A009] transition-all border border-[#C5A009] shadow-lg">返回首頁 ‧ 感受神恩</a>
    </div>
  </main>

  <footer class="bg-[#B22222] py-12 text-center text-white/60 text-xs tracking-widest">
    &copy; 2026 南海慈寧宮 ‧ 慈雲普覆 寧境安心
  </footer>

  <script>
    const handleReveal = () => {
      const reveals = document.querySelectorAll('.reveal');
      reveals.forEach(reveal => {
        const windowHeight = window.innerHeight;
        const revealTop = reveal.getBoundingClientRect().top;
        if (revealTop < windowHeight - 50) {
          reveal.classList.add('active');
        }
      });
    };
    window.addEventListener('scroll', handleReveal);
    window.addEventListener('load', handleReveal);
  </script>
</body>
</html>
